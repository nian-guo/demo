name: Deploy Pages Official
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 安装Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安装依赖
        run: npm i
      - name: 打包
        run: npm run build
      - name: 上传产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到Pages
        id: deployment
        uses: actions/deploy-pages@v4